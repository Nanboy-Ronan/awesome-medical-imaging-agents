<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 660" width="760" height="660">
<defs>
  <!-- Background -->
  <linearGradient id="bg-g" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#eef4ff"/>
    <stop offset="100%" stop-color="#f8fafc"/>
  </linearGradient>
  <!-- Root -->
  <linearGradient id="root-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#0f172a"/>
    <stop offset="100%" stop-color="#1e3a8a"/>
  </linearGradient>
  <!-- Radiology: blue -->
  <linearGradient id="rad-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#1e3a8a"/>
    <stop offset="100%" stop-color="#3b82f6"/>
  </linearGradient>
  <!-- Pathology: purple -->
  <linearGradient id="path-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#5b21b6"/>
    <stop offset="100%" stop-color="#8b5cf6"/>
  </linearGradient>
  <!-- Ultrasound: teal-green -->
  <linearGradient id="us-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#065f46"/>
    <stop offset="100%" stop-color="#10b981"/>
  </linearGradient>
  <!-- Segmentation: amber -->
  <linearGradient id="seg-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#92400e"/>
    <stop offset="100%" stop-color="#f59e0b"/>
  </linearGradient>
  <!-- VLM: rose-red -->
  <linearGradient id="vlm-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7f1d1d"/>
    <stop offset="100%" stop-color="#f43f5e"/>
  </linearGradient>
  <!-- Evaluation: slate -->
  <linearGradient id="eval-g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#111827"/>
    <stop offset="100%" stop-color="#4b5563"/>
  </linearGradient>
</defs>

<!-- ─── Background ─────────────────────────────────────────────────── -->
<rect width="760" height="660" fill="url(#bg-g)" rx="12" stroke="#dde6f0" stroke-width="1.5"/>

<!-- ─── Title ────────────────────────────────────────────────────────── -->
<text x="380" y="30" text-anchor="middle" dominant-baseline="middle"
