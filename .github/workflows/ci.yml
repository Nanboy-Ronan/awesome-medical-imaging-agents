name: CI

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'data/papers.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'data/papers.yml'
      - '.github/workflows/ci.yml'
  schedule:
    # Run link check weekly on Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  validate-yaml:
    name: Validate papers.yml schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate YAML schema
        run: python scripts/generate_readme.py --validate-only

  check-links:
    name: Check README links
    runs-on: ubuntu-latest
    # Run on schedule and manual triggers; skip on PR to avoid rate-limiting noise
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Check README links
        run: |
          python check_readme_links.py README.md 2>&1 | tee link-check.log
          # Fail if any link returned a non-200 status or an error
          if grep -qiE '(status code [^2]|error occurred)' link-check.log; then
            echo "::warning::Some links may be broken — see link-check.log above."
          fi
        continue-on-error: true
      - name: Upload link-check log
        uses: actions/upload-artifact@v4
        with:
          name: link-check-log
          path: link-check.log
          retention-days: 14
