# Schema for entries in data/papers.yml
#
# Required fields:
#   title       (str)  — Full paper or system name.
#   year        (int)  — Publication or preprint year.
#   domain      (str)  — Primary medical domain (e.g. "Radiology", "Pathology", "Survey").
#   summary     (str)  — One-sentence description of the agent workflow or key contribution.
#
# Optional fields — use null when unavailable:
#   venue       (str)  — Conference/journal (e.g. "ICML 2025", "arXiv", "npj Digital Medicine").
#   paper_url   (str)  — Direct URL to the paper (arXiv, DOI, OpenReview, etc.).
#   code_url    (str)  — GitHub or repository URL.
#   project_url (str)  — Project page / demo URL.
#   dataset_url (str)  — Dataset download URL (HuggingFace, Zenodo, etc.).
#   benchmark_url (str) — Benchmark leaderboard or evaluation page URL.
#   featured    (bool) — true for landmark / "Start Here" entries; false otherwise.
#
# List fields (use YAML block sequences; put null for genuinely unknown):
#   modality    (list[str]) — Imaging modalities involved (e.g. ["CXR", "CT"]).
#   task        (list[str]) — Agent tasks (e.g. ["report generation", "tool use"]).
#   agent_type  (list[str]) — Agent architecture style (e.g. ["multi-agent", "tool-using", "RL-trained"]).
#   tags        (list[str]) — Free-form keywords for filtering (e.g. ["hallucination", "RAG"]).
#
# Conventions:
#   - null  → field is unknown or not applicable.
#   - ""    → field exists but is intentionally empty (avoid; prefer null).
#   - Lists should contain at least one element, or be null if nothing applies.

